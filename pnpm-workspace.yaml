savePrefix: ""
strictDepBuilds: true
strictPeerDependencies: true
verifyDepsBeforeRun: error

allowBuilds:
  aiur-orchestrator@file:../aiur-orchestrator: true
  esbuild: true
  msgpackr-extract: false
