name: Quality

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: quality-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  offline:
    name: Offline gates (Node ${{ matrix.node-version }})
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        node-version:
          - 22.22.2
          - 24.15.0
    defaults:
      run:
        working-directory: templar
    steps:
      - name: Check out Templar
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          path: templar
          persist-credentials: false
      - name: Check out the sibling Agent Blocks dependency
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          path: agent-blocks
          persist-credentials: false
          ref: 9062646cfeccf546754a067c8655662428df60a9
          repository: daoa0601/agent-blocks
      - name: Check out the sibling Drone Client dependency
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          path: drone-client
          persist-credentials: false
          ref: 543f251f1b4351b56d73984bb651a83975aa7d64
          repository: daoa0601/drone-client
      - name: Check out the sibling Node Guardrails dependency
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          path: node-guardrails
          persist-credentials: false
          ref: e4980431b3e1a20dd94b41cb7b9914bf916f762c
          repository: daoa0601/node-guardrails
      - name: Check out the sibling TypeScript Quality dependency
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          path: ts-quality
          persist-credentials: false
          ref: 310520ed4f106512a25b524fd1689574e97835d9
          repository: daoa0601/ts-quality
      - name: Install pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          run_install: false
          version: 11.13.1
      - name: Install Node.js
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6.5.0
        with:
          cache: pnpm
          cache-dependency-path: templar/pnpm-lock.yaml
          node-version: ${{ matrix.node-version }}
      - name: Build the sibling Node Guardrails module
        working-directory: node-guardrails
        run: |
          pnpm install --frozen-lockfile
          pnpm build
      - name: Build the sibling Agent Blocks module
        working-directory: agent-blocks
        run: |
          pnpm install --frozen-lockfile
          pnpm build
      - name: Build the sibling Drone Client module
        working-directory: drone-client
        run: |
          pnpm install --frozen-lockfile
          pnpm build
      - name: Install frozen Templar dependencies
        run: pnpm install --frozen-lockfile
      - name: Run offline quality gates
        run: pnpm quality:offline

  dependencies:
    name: Dependency trust gates
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    defaults:
      run:
        working-directory: templar
    steps:
      - name: Check out Templar
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          path: templar
          persist-credentials: false
      - name: Check out the sibling Agent Blocks dependency
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          path: agent-blocks
          persist-credentials: false
          ref: 9062646cfeccf546754a067c8655662428df60a9
          repository: daoa0601/agent-blocks
      - name: Check out the sibling Drone Client dependency
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          path: drone-client
          persist-credentials: false
          ref: 543f251f1b4351b56d73984bb651a83975aa7d64
          repository: daoa0601/drone-client
      - name: Check out the sibling Node Guardrails dependency
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          path: node-guardrails
          persist-credentials: false
          ref: e4980431b3e1a20dd94b41cb7b9914bf916f762c
          repository: daoa0601/node-guardrails
      - name: Check out the sibling TypeScript Quality dependency
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          path: ts-quality
          persist-credentials: false
          ref: 310520ed4f106512a25b524fd1689574e97835d9
          repository: daoa0601/ts-quality
      - name: Install pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          run_install: false
          version: 11.13.1
      - name: Install Node.js
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6.5.0
        with:
          cache: pnpm
          cache-dependency-path: templar/pnpm-lock.yaml
          node-version: 24.15.0
      - name: Build the sibling Node Guardrails module
        working-directory: node-guardrails
        run: |
          pnpm install --frozen-lockfile
          pnpm build
      - name: Build the sibling Agent Blocks module
        working-directory: agent-blocks
        run: |
          pnpm install --frozen-lockfile
          pnpm build
      - name: Install frozen dependencies
        run: pnpm install --frozen-lockfile
      - name: Audit advisories and registry signatures
        run: pnpm deps:check
